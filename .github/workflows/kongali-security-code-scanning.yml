name: Kongali Security Code Scanning

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  kongali-security:
    name: Kongali Security SARIF Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Kongali Security
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Debug installed package
        run: |
          python - <<'PY'
          import inspect
          import pathlib
          import kongali_security.cli

          p = pathlib.Path(inspect.getsourcefile(kongali_security.cli))
          print("CLI:", p)
          print("=" * 60)
          for i, line in enumerate(p.read_text().splitlines()[:40], 1):
              print(f"{i:02d}: {line}")
          PY

      - name: Run Kongali Security scan
        run: |
          kongali-security report \
            https://example.com \
            --format sarif \
            --output kongali-results.sarif

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: kongali-results.sarif
          category: kongali-security
