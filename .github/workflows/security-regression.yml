name: Security Regression Check

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  security-regression:
    name: Security Regression Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run test suite
        run: |
          pytest -q

      - name: Generate current security report
        run: |
          kongali-security report https://example.com \
            --format json \
            --output current.json

      - name: Compare security baseline
        run: |
          kongali-security compare \
            baseline.json \
            current.json \
            --format json > comparison.json

      - name: Display security comparison
        run: |
          cat comparison.json

      - name: Check security regression
        run: |
          python - <<'PY'
          import json
          import sys

          with open("comparison.json", "r", encoding="utf-8") as file:
              result = json.load(file)

          regression = result.get("regression", False)

          print(f"Security Regression: {regression}")

          if regression:
              print(
                  "ERROR: Security regression detected. "
                  "Pull Request blocked."
              )
              sys.exit(1)

          print(
              "OK: No security regression detected."
          )
          PY

      - name: Upload security comparison artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-regression-report
          path: |
            baseline.json
            current.json
            comparison.json
